<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact — landonw.dev</title>
  <meta name="description" content="Contact Landon for questions, collaboration, and technology discussions." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/contact.css" />
  

</head>

<body>

  <!-- Background Layers -->
  <canvas id="grid-canvas" aria-hidden="true"></canvas>
  <div class="grid-glow" aria-hidden="true"></div>


  <!-- Navbar -->
  <nav class="navbar">

    <a href="index.html" class="navbar__brand">
      <span class="navbar__logo">
        landonw.dev
      </span>
    </a>


    <button class="navbar__toggle" aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>


    <ul class="navbar__links">

      <li>
        <a class="navbar__link" href="index.html#home">
          Home
        </a>
      </li>

      <li>
        <a class="navbar__link" href="index.html#about">
          About
        </a>
      </li>

      <li>
        <a class="navbar__link" href="index.html#projects">
          Portfolio
        </a>
      </li>

      <li>
        <a class="navbar__link is-active" href="contact.html">
          Contact
        </a>
      </li>

    </ul>

  </nav>



  <!-- Contact Page -->

  <main class="contact-page">


    <section class="contact-hero">


      <div class="contact-card">


        <div class="contact-header">

          <span class="eyebrow">
            Contact
          </span>


          <h1>
            Send a Message
          </h1>


          <p>
            Have a question, want to discuss a project,
            or just want to connect about technology?
            Feel free to send me a message.
          </p>

        </div>



        <form class="contact-form">


          <div class="form-row">

            <div class="form-group">

              <label for="name">
                Name
              </label>

              <input 
                type="text"
                id="name"
                name="name"
                placeholder="Your name">

            </div>



            <div class="form-group">

              <label for="email">
                Email
              </label>

              <input 
                type="email"
                id="email"
                name="email"
                placeholder="your@email.com">

            </div>

          </div>



          <div class="form-group">

            <label for="subject">
              Subject
            </label>

            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="What would you like to discuss?">

          </div>




          <div class="form-group">

            <label for="message">
              Message
            </label>

            <textarea
              id="message"
              name="message"
              rows="6"
              placeholder="Write your message here..."></textarea>

          </div>



          <button type="submit" class="btn btn-primary">
            Send Message →
          </button>


        </form>


      </div>

      <a href="index.html#contact" class="contact-back">
         ← Back to Portfolio
      </a>


    </section>


  </main>



  <!-- Scripts -->

  <script src="js/particles.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
